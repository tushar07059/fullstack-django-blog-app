{% extends "base.html" %}
{% block title %}BLOGZONE | Bookmarked posts {% endblock title %}
{% block content %}
  <div class="container">
    <div class="page-top">
      <div class="top flex">
        <div class="page-name">
          <a href="{% url 'index'  %}" class="learn">
            <span class="material-icons"> keyboard_return </span> Go back
          </a>
          <h1>{{user.first_name}}'s liked posts</h1>
        </div>
      </div>
    </div>
  </div>
</main>
<section class="sp">
  <div class="container">
    <div class="blog-tags">
    {% for post in all_liked_posts %}
    <p class="tag">
      <a style="color: white;" href="{% url 'post_page' post.slug %}">{{post.title}}</a>
    </p>
    {% endfor %}
  </div>
  </div>
</section>
{% endblock content %}
